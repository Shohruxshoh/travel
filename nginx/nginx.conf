# ═══════════════════════════════════════════════════════════════
# Server Nginx Config for silk-road-trip.com
# Copy to: /etc/nginx/sites-available/silk-road-trip.com
# Then: ln -s /etc/nginx/sites-available/silk-road-trip.com /etc/nginx/sites-enabled/
# ═══════════════════════════════════════════════════════════════

server {
    listen 80;
    server_name silk-road-trip.com www.silk-road-trip.com;

    # Proxy EVERYTHING to Docker Nginx (including certbot challenges)
    location / {
        proxy_pass http://127.0.0.1:7002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 50M;
    }
}
